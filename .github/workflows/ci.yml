name: CI Pipeline

on:
  pull_request:
    branches: [main, master]
    # Runs on every PR to main/master
  push:
    branches: [main, master]
    # Also runs on merge to main/master

jobs:
  test:
    name: Run Unit Tests with Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true

      - name: Build all modules
        run: |
          go build ./...
          cd aws           && go build ./... && cd ..
          cd database/sql  && go build ./... && cd ../..
          cd database/redis && go build ./... && cd ../..
          cd database/mongodb && go build ./... && cd ../..
          cd database/memcached && go build ./... && cd ../..
          cd messaging     && go build ./... && cd ..

      - name: Run Tests with Coverage (core)
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Run Tests (aws)
        run: cd aws && go test ./...

      - name: Run Tests (database/redis)
        run: cd database/redis && go test ./...

      - name: Run Tests (messaging)
        run: cd messaging && go test ./...

      - name: Check Coverage File
        run: |
          if [ ! -f coverage.out ]; then
            echo "Coverage report not found!"
            exit 1
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out