version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused

  # revive was evaluated and removed: golangci-lint v2.12.2 does not respect
  # enable-all-rules: false — default rules (exported, package-comments,
  # unused-parameter) trigger on ~50 pre-existing symbols making CI unusable.
  # Revisit when the project adopts a godoc-first policy or upgrades the linter.

issues:
  exclude-rules:
    - path: ".*_test\\.go"
      linters:
        - errcheck

    # middleware.RealIP deprecation — removal requires infrastructure changes; tracked separately
    - linters: [staticcheck]
      text: "SA1019.*middleware\\.RealIP"

    # Explicit interface satisfaction guards (var _ I = val) are intentional in tests
    - linters: [staticcheck]
      text: "QF1011"

formatters:
  enable:
    - gofmt
    - goimports
